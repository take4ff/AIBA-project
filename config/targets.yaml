# =============================================================================
# AIBA 監視ターゲット定義
# -----------------------------------------------------------------------------
# テーマ（技術領域）ごとに、テクニカル測定用のティッカーを地域別に定義する。
#   tickers.global : 広範なテーマETF（グローバル）
#   tickers.us     : 米国の代表銘柄/ETF
#   tickers.jp     : 日本の代表銘柄（東証, .T）
# センチメント測定用キーワード（GitHub / arXiv）はテーマ共通（地域非依存）。
#
# layer: 1=現在のブーム / 2=次なる波 / 3=未来の開拓地
# 各テーマ×地域は domains テーブルでは "<theme_id>_<region>" のIDで管理される。
# =============================================================================

domains:
  # ---------------- 第1層：現在のブーム (Current Trend) ----------------
  - id: advanced_semiconductor
    name: 先端半導体（GPU）
    layer: 1
    tickers: { global: SOXX, us: NVDA, jp: "8035.T" }
    github_keywords: ["cuda", "gpu kernel", "tensorrt"]
    arxiv_keywords: ["GPU accelerator", "AI chip"]

  - id: generative_ai
    name: 生成AI基盤
    layer: 1
    tickers: { global: AIQ, us: MSFT, jp: "9984.T" }
    github_keywords: ["llm", "transformer", "diffusion model"]
    arxiv_keywords: ["large language model", "generative model"]

  - id: cloud_infra
    name: クラウドインフラ
    layer: 1
    tickers: { global: SKYY, us: AMZN, jp: "3778.T" }
    github_keywords: ["kubernetes", "serverless", "terraform"]
    arxiv_keywords: ["cloud computing", "datacenter scheduling"]

  # ---------------- 第2層：次なる波 (Next Wave) ----------------
  - id: cooling_power_infra
    name: 冷却・電力インフラ
    layer: 2
    tickers: { global: GRID, us: VST, jp: "6501.T" }
    github_keywords: ["liquid cooling", "power management", "smart grid"]
    arxiv_keywords: ["data center cooling", "power grid optimization"]

  - id: edge_ai_robotics
    name: エッジAI・ロボティクス
    layer: 2
    tickers: { global: ROBO, us: ROK, jp: "6954.T" }
    github_keywords: ["edge ai", "ros2", "tinyml"]
    arxiv_keywords: ["edge inference", "robot learning"]

  - id: bioinformatics
    name: バイオインフォマティクス
    layer: 2
    tickers: { global: ARKG, us: ILMN, jp: "4587.T" }
    github_keywords: ["bioinformatics", "genomics", "protein folding"]
    arxiv_keywords: ["computational biology", "protein structure prediction"]

  # ---------------- 第3層：未来の開拓地 (Future Frontier) ----------------
  - id: quantum_computing
    name: 量子コンピューティング
    layer: 3
    tickers: { global: QTUM, us: IONQ, jp: "6702.T" }
    github_keywords: ["qiskit", "quantum circuit", "qubit"]
    arxiv_keywords: ["quantum computing", "quantum error correction"]

  - id: space_infra
    name: 宇宙インフラ・通信網
    layer: 3
    tickers: { global: UFO, us: RKLB, jp: "7011.T" }
    github_keywords: ["satellite", "gnss", "orbital mechanics"]
    arxiv_keywords: ["satellite communication", "low earth orbit"]

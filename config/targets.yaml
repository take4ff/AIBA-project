# =============================================================================
# AIBA 監視ターゲット定義
# -----------------------------------------------------------------------------
# テーマ × 地域 × 銘柄。各地域に業界ETF(etf)と複数の個別株(stocks)を持つ。
#   instruments.<region>.etf    : 業界テーマ/業種ETF（業界ページ最上部・基準）
#   instruments.<region>.stocks : 有名個別株のリスト（社名 name 表示）
#   region = global | us | jp
# センチメント用キーワードはテーマ共通。
# domains の id:
#   ETF   = "<theme>_<region>_etf"
#   個別株 = "<theme>_<region>_<ticker-slug>"  （例: advanced_semiconductor_us_nvda）
# =============================================================================

domains:
  # ---------------- 第1層：現在のブーム ----------------
  - id: advanced_semiconductor
    name: 先端半導体（GPU）
    layer: 1
    instruments:
      global: { etf: { ticker: SOXX } }
      us:
        etf: { ticker: SMH }
        stocks: [{ ticker: NVDA, name: NVIDIA }, { ticker: AMD, name: AMD }, { ticker: AVGO, name: Broadcom }, { ticker: ARM, name: Arm }, { ticker: TSM, name: TSMC }, { ticker: ASML, name: ASML }, { ticker: MU, name: Micron }, { ticker: QCOM, name: Qualcomm }, { ticker: LRCX, name: Lam Research }, { ticker: AMAT, name: Applied Materials }, { ticker: KLAC, name: KLA }, { ticker: ENTG, name: Entegris }, { ticker: UCTT, name: Ultra Clean }]
      jp:
        etf: { ticker: "2644.T", name: "Global X 日本半導体" }
        stocks: [{ ticker: "8035.T", name: 東京エレクトロン }, { ticker: "6857.T", name: アドバンテスト }, { ticker: "6146.T", name: ディスコ }, { ticker: "4062.T", name: イビデン }, { ticker: "6323.T", name: ローツェ }, { ticker: "6920.T", name: レーザーテック }, { ticker: "6963.T", name: ローム }, { ticker: "2802.T", name: 味の素（ABF基板材料） }, { ticker: "4063.T", name: 信越化学工業 }, { ticker: "3436.T", name: SUMCO }, { ticker: "4186.T", name: 東京応化工業 }, { ticker: "4004.T", name: レゾナック（後工程材料） }]

# =============================================================================
# 新興テーマ候補（ユニバース未採用）
# -----------------------------------------------------------------------------
# まだ銘柄を採用していないが「これから伸びてきそう」な領域。
# candidates_job.py が keywords の研究熱量（増加率）を実測し、/themes に熱量順で表示。
# 有望化したら上の domains に昇格させる。
# =============================================================================
candidates:
  - id: neuromorphic
    name: ニューロモーフィック・コンピューティング

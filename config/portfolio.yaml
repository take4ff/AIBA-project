# =============================================================================
# 自分用ポートフォリオ（売り時＝過熱の可視化）
# -----------------------------------------------------------------------------
# kind:
#   direct : 直接保有の上場銘柄/ETF。価格・損益％・過熱度を表示。
#   proxy  : 投信を同一指数のETFで代替。過熱度（売り時）のみ。損益は非表示
#            （投信の基準価額とETF価格は絶対水準が異なるため）。
# avg_cost : 取得単価（direct のみ・currency 建て）。proxy は null。
# 除外: eMAXIS Slim オルカン（積立投信）, スペースX（非上場で株価なし）。
# =============================================================================

holdings:

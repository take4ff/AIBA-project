name: AIBA Daily Batch

on:
  schedule:
    # 米国市場の閉場後（夏時間16:00 ET = 20:00 UTC、冬時間21:00 UTC）を見込み、
    # 余裕をもって日本時間早朝に実行（22:00 UTC = JST 翌07:00）。
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}  # 手動実行を許可

concurrency:
  group: aiba-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Search APIのレート制限緩和用に、発行したPAT(GH_PAT)を使う。
          # Actions既定の GITHUB_TOKEN は Search API に使えないため別Secretを参照。
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          # 特許センチメント用（未設定なら自動スキップ）。
          PATENTSVIEW_API_KEY: ${{ secrets.PATENTSVIEW_API_KEY }}
        run: python run_daily.py

      - name: Run forecast
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python predict.py

      - name: Update portfolio (sell signals)
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python portfolio_job.py

      - name: Universe fundamentals
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fundamentals_job.py

      - name: Backtest (save results)
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backtest.py --save

      - name: Score snapshots (record monthly + evaluate)
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python snapshot.py

      - name: Data quality check
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python check_data.py

      - name: Daily signal alert (optional Slack)
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python notify.py

      - name: Notify on failure (optional Slack)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"⚠️ AIBA daily batch failed (run ${GITHUB_RUN_ID}). See: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
              "$SLACK_WEBHOOK_URL"
          else
            echo "SLACK_WEBHOOK_URL 未設定。GitHub標準の失敗通知メールに委ねます。"
          fi
